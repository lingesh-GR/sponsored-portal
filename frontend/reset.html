<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — Sponsored Program Portal</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

    <div class="auth-container">
        <!-- LEFT — BRANDING PANEL -->
        <div class="brand-panel">
            <div class="brand-logo">
                <i class="fas fa-key"></i>
            </div>
            <h1 class="brand-title">Reset Access</h1>
            <p class="brand-tagline">Create a new, secure password to regain access to your personal portal dashboard.</p>
        </div>

        <!-- RIGHT — FORM PANEL -->
        <div class="form-panel">
            <div class="card">
                <h2>New Password</h2>
                <p class="subtitle">Enter your new secure password below</p>

                <form id="resetForm">
                    <div class="form-group">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="password" placeholder="New password" required>
                        <i class="fas fa-eye eye-toggle" id="togglePassword"></i>
                    </div>

                    <div id="msg"></div>

                    <button type="submit" class="auth-btn">
                        <span>Reset Password</span>
                    </button>
                    
                    <div class="auth-links">
                        <a href="login.html">
                            <i class="fas fa-arrow-left"></i> Back to Login
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/password.js"></script>
</body>
</html>
